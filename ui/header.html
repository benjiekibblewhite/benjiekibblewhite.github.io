<header role="banner">
  <a href="/" aria-label="Go to homepage">
    <img
      src="/static/logo.webp"
      alt="Blog Logo"
      class="header-logo"
      width="150px"
    />
  </a>
  <div class="header-right">
    <a
      href="/rss.xml"
      class="rss-link header-link"
      title="Subscribe to RSS feed"
      aria-label="RSS Feed"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="header-icon"
        aria-hidden="true"
        role="img"
      >
        <path d="M4 11a9 9 0 0 1 9 9"></path>
        <path d="M4 4a16 16 0 0 1 16 16"></path>
        <circle cx="5" cy="19" r="1"></circle>
      </svg>
    </a>
    <a href="/menu.html" class="header-link" aria-label="Open menu"
      ><svg
        xmlns="http://www.w3.org/2000/svg"
        height="24px"
        viewBox="0 -960 960 960"
        width="24px"
        fill="currentColor"
        class="header-icon"
        aria-hidden="true"
      >
        <path
          d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"
        /></svg
    ></a>
  </div>
</header>
